name: Generate Test Environment Files

# This workflow generates .env files from GitHub Secrets for local testing
# The files are uploaded as encrypted artifacts that can be downloaded by authorized users
#
# Usage:
# 1. Go to Actions > "Generate Test Environment Files"
# 2. Click "Run workflow"
# 3. Select which worker(s) to generate env files for
# 4. Download the artifact(s) after the workflow completes
# 5. Extract and place the .env file in the appropriate worker directory

on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Which workers to generate env files for'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ai-coding-worker
          - storage-worker
          - website

jobs:
  generate-env-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate AI Coding Worker .env
        if: inputs.workers == 'all' || inputs.workers == 'ai-coding-worker'
        run: |
          mkdir -p artifacts/ai-coding-worker
          cat > artifacts/ai-coding-worker/.env << 'EOF'
          # AI Coding Worker Environment Configuration
          # Generated by GitHub Actions workflow
          # Generated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Server Configuration
          PORT=5000
          TMP_DIR=/tmp
          WORKSPACE_DIR=/workspace

          # Storage Worker Configuration
          STORAGE_WORKER_URL=${{ secrets.TEST_STORAGE_WORKER_URL || 'http://storage-worker:3000' }}
          STORAGE_WORKER_TIMEOUT=60000

          # Coding Assistant Configuration
          CODING_ASSISTANT_PROVIDER=ClaudeAgentSDK
          CODING_ASSISTANT_AUTHENTICATION=${{ secrets.TEST_CLAUDE_AUTH_JSON }}

          # GitHub Token (for GitHub integration testing)
          GITHUB_ACCESS_TOKEN=${{ secrets.TEST_GITHUB_ACCESS_TOKEN }}

          # Website API callback configuration
          WEBSITE_API_URL=${{ secrets.TEST_WEBSITE_API_URL || 'http://localhost:3000' }}
          WORKER_CALLBACK_SECRET=${{ secrets.WORKER_CALLBACK_SECRET }}

          # Database (optional)
          DB_BASE_URL=${{ secrets.TEST_DB_BASE_URL }}
          EOF

          echo "✅ Generated ai-coding-worker/.env"

      - name: Generate Storage Worker .env
        if: inputs.workers == 'all' || inputs.workers == 'storage-worker'
        run: |
          mkdir -p artifacts/storage-worker
          cat > artifacts/storage-worker/.env << 'EOF'
          # Storage Worker Environment Configuration
          # Generated by GitHub Actions workflow
          # Generated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          PORT=3000

          # MinIO Configuration
          MINIO_ENDPOINT=${{ secrets.TEST_MINIO_ENDPOINT || 'minio' }}
          MINIO_PORT=${{ secrets.TEST_MINIO_PORT || '9000' }}
          MINIO_USE_SSL=${{ secrets.TEST_MINIO_USE_SSL || 'false' }}
          MINIO_ROOT_USER=${{ secrets.TEST_MINIO_ROOT_USER || 'minioadmin' }}
          MINIO_ROOT_PASSWORD=${{ secrets.TEST_MINIO_ROOT_PASSWORD || 'minioadmin' }}
          MINIO_BUCKET=${{ secrets.TEST_MINIO_BUCKET || 'sessions' }}
          EOF

          echo "✅ Generated storage-worker/.env"

      - name: Generate Website .env
        if: inputs.workers == 'all' || inputs.workers == 'website'
        run: |
          mkdir -p artifacts/website
          cat > artifacts/website/.env << 'EOF'
          # Website Environment Configuration
          # Generated by GitHub Actions workflow
          # Generated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Server Configuration
          PORT=3000
          NODE_ENV=development

          # Session Configuration
          SESSION_SECRET=${{ secrets.TEST_SESSION_SECRET }}

          # AI Worker Configuration
          AI_WORKER_URL=${{ secrets.TEST_AI_WORKER_URL || 'http://localhost:5001' }}

          # Storage Worker Configuration
          STORAGE_WORKER_URL=${{ secrets.TEST_STORAGE_WORKER_URL || 'http://storage-worker:3000' }}

          # Database Configuration
          DATABASE_URL=${{ secrets.TEST_DATABASE_URL }}

          # GitHub OAuth Configuration
          GITHUB_CLIENT_ID=${{ secrets.TEST_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET=${{ secrets.TEST_GITHUB_CLIENT_SECRET }}

          # Allowed Origins (CORS)
          ALLOWED_ORIGINS=${{ secrets.TEST_ALLOWED_ORIGINS || 'http://localhost:5173,http://localhost:3000' }}

          # Worker Callback Secret
          WORKER_CALLBACK_SECRET=${{ secrets.WORKER_CALLBACK_SECRET }}
          EOF

          echo "✅ Generated website/.env"

      - name: List generated files
        run: |
          echo "📁 Generated environment files:"
          find artifacts -type f -name ".env" | while read f; do
            echo "  - $f"
            echo "    Lines: $(wc -l < "$f")"
          done

      - name: Upload AI Coding Worker Env
        if: inputs.workers == 'all' || inputs.workers == 'ai-coding-worker'
        uses: actions/upload-artifact@v4
        with:
          name: ai-coding-worker-env
          path: artifacts/ai-coding-worker/.env
          retention-days: 1
          if-no-files-found: error

      - name: Upload Storage Worker Env
        if: inputs.workers == 'all' || inputs.workers == 'storage-worker'
        uses: actions/upload-artifact@v4
        with:
          name: storage-worker-env
          path: artifacts/storage-worker/.env
          retention-days: 1
          if-no-files-found: error

      - name: Upload Website Env
        if: inputs.workers == 'all' || inputs.workers == 'website'
        uses: actions/upload-artifact@v4
        with:
          name: website-env
          path: artifacts/website/.env
          retention-days: 1
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## Test Environment Files Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following environment files have been generated and are available as artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.workers }}" = "all" ] || [ "${{ inputs.workers }}" = "ai-coding-worker" ]; then
            echo "- ✅ **ai-coding-worker/.env** - Download: ai-coding-worker-env" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ inputs.workers }}" = "all" ] || [ "${{ inputs.workers }}" = "storage-worker" ]; then
            echo "- ✅ **storage-worker/.env** - Download: storage-worker-env" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ inputs.workers }}" = "all" ] || [ "${{ inputs.workers }}" = "website" ]; then
            echo "- ✅ **website/.env** - Download: website-env" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the artifact(s) from the Artifacts section below" >> $GITHUB_STEP_SUMMARY
          echo "2. Extract the zip file(s)" >> $GITHUB_STEP_SUMMARY
          echo "3. Place the \`.env\` file in the appropriate worker directory" >> $GITHUB_STEP_SUMMARY
          echo "4. Run \`docker-compose up\` or the worker directly" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Note**: Artifacts expire after 1 day for security reasons." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Required Secrets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Make sure the following secrets are configured in your repository:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**AI Coding Worker:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`TEST_CLAUDE_AUTH_JSON\` - Claude OAuth JSON" >> $GITHUB_STEP_SUMMARY
          echo "- \`TEST_GITHUB_ACCESS_TOKEN\` - GitHub personal access token" >> $GITHUB_STEP_SUMMARY
          echo "- \`WORKER_CALLBACK_SECRET\` - Shared secret for callbacks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Storage Worker:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`TEST_MINIO_ROOT_PASSWORD\` - MinIO password (if not using defaults)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Website:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`TEST_SESSION_SECRET\` - Session encryption secret" >> $GITHUB_STEP_SUMMARY
          echo "- \`TEST_DATABASE_URL\` - PostgreSQL connection string" >> $GITHUB_STEP_SUMMARY
          echo "- \`TEST_GITHUB_CLIENT_ID\` - GitHub OAuth App client ID" >> $GITHUB_STEP_SUMMARY
          echo "- \`TEST_GITHUB_CLIENT_SECRET\` - GitHub OAuth App client secret" >> $GITHUB_STEP_SUMMARY
